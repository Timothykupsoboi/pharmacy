<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Login — Edoc Pharmacy</title>
    <meta name="description" content="Seller login portal for Edoc Pharmacy Management System.">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                </div>
                <span class="login-logo-text">Edoc Pharmacy</span>
            </div>

            <div style="text-align: center; margin-bottom: 8px;">
                <span class="login-role-badge seller">Seller</span>
            </div>
            <p class="login-subtitle">Sign in to process sales, manage prescriptions, and serve customers.</p>

            <div class="login-error" id="login-error"></div>

            <form class="login-form" id="seller-login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <div class="login-options">
                    <label class="login-remember">
                        <input type="checkbox" id="remember-me"> Remember me
                    </label>
                    <span class="login-forgot" id="forgot-password-btn">Forgot Password?</span>
                </div>
                <button type="submit" class="login-btn seller-btn" id="login-submit-btn">
                    Sign In to Seller Portal
                </button>
            </form>

            <div class="login-footer">
                <p>Are you an administrator? <a href="admin-login.html">Admin Login</a></p>
                <p style="margin-top: 8px;"><a href="index.html">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await Auth.seedPasswords();

            const session = Auth.getSession();
            if (session && session.role === 'seller') {
                window.location.href = 'seller.html';
                return;
            }

            const form = document.getElementById('seller-login-form');
            const errorBox = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorBox.style.display = 'none';
                submitBtn.textContent = 'Signing in...';
                submitBtn.disabled = true;

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const remember = document.getElementById('remember-me').checked;

                const result = await Auth.loginSeller(username, password, remember);

                if (result.success) {
                    window.location.href = 'seller.html';
                } else {
                    errorBox.textContent = result.error;
                    errorBox.style.display = 'block';
                    submitBtn.textContent = 'Sign In to Seller Portal';
                    submitBtn.disabled = false;
                }
            });

            document.getElementById('forgot-password-btn').addEventListener('click', () => {
                errorBox.textContent = 'Please contact your administrator to reset your password.';
                errorBox.style.display = 'block';
            });
        });
    </script>
</body>
</html>
