<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Login — Edoc Pharmacy</title>
    <meta name="description" content="Seller login portal for Edoc Pharmacy Management System.">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="login-page">
        <div class="login-bg-glow top-right"></div>
        <div class="login-bg-glow bottom-left"></div>
        
        <a href="index.html" class="back-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            BACK TO HOME
        </a>

        <div class="login-container">
            <div class="login-form-side">
                <div class="login-indicator"></div>
                <div class="login-header-text">EDOC PHARMACY</div>
                <h1>Portal <span>Login</span></h1>
                <p>Enter your seller credentials to proceed.</p>

                <div class="login-error" id="login-error"></div>

                <form class="login-form" id="seller-login-form">
                    <div class="form-group">
                        <label for="username">Email or Username</label>
                        <input type="text" id="username" placeholder="seller@edoc.med or username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    
                    <button type="submit" class="login-btn" id="login-submit-btn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                        Sign In
                    </button>
                    
                    <div style="display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px;">
                        <label style="display: flex; align-items: center; gap: 5px; color: #64748B; cursor: pointer;">
                            <input type="checkbox" id="remember-me" style="width: auto; padding: 0; margin: 0;"> Remember me
                        </label>
                        <a href="#" id="forgot-password-btn" style="color: #f97316; text-decoration: none; font-weight: 700;">Forgot Password?</a>
                    </div>
                </form>
                <div style="text-align: center; margin-top: 30px; font-size: 13px; color: #64748B;">
                    <p>Are you an administrator? <a href="admin-login.html" style="color: #f97316; font-weight: 700; text-decoration: none;">Admin Login</a></p>
                </div>
            </div>

            <div class="login-illustration-side">
                <div class="illustration-frame">
                    <img src="./img/team.png" alt="Clinical Team">
                    <div class="badge-float secure">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        SECURE ACCESS
                    </div>
                    <div class="badge-float staff">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        VERIFIED STAFF
                    </div>
                    <div class="badge-float micro">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await Auth.seedPasswords();

            const session = Auth.getSession();
            if (session && session.role === 'seller') {
                window.location.href = 'seller.html';
                return;
            }

            const form = document.getElementById('seller-login-form');
            const errorBox = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorBox.style.display = 'none';
                submitBtn.textContent = 'Signing in...';
                submitBtn.disabled = true;

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const remember = document.getElementById('remember-me').checked;

                const result = await Auth.loginSeller(username, password, remember);

                if (result.success) {
                    window.location.href = 'seller.html';
                } else {
                    errorBox.textContent = result.error;
                    errorBox.style.display = 'block';
                    submitBtn.textContent = 'Sign In to Seller Portal';
                    submitBtn.disabled = false;
                }
            });

            document.getElementById('forgot-password-btn').addEventListener('click', () => {
                errorBox.textContent = 'Please contact your administrator to reset your password.';
                errorBox.style.display = 'block';
            });
        });
    </script>
</body>
</html>
